services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy
    container_name: wg-easy
    env_file: .env
    volumes:
      - /opt/wg-easy/data:/etc/wireguard
    ports:
      - "${WG_PORT_UDP}:51820/udp"
      - "${WG_PORT_TCP}:51821/tcp"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      wg-net:
        ipv4_address: 10.8.1.2
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  wg-net:
    name: wg-net
    ipam:
      config:
        - subnet: 10.8.1.0/24
